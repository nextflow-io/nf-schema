name: Lint Groovy code
on:
  push:
  pull_request:

jobs:
  groovy-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v2
        with:
          node-version: '16'
      - name: Install Groovy Lint
        run: npm install -g npm-groovy-lint
      - name: Run Groovy Lint
        run: make lint